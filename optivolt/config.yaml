name: Optivolt
slug: optivolt
version: "0.7.8"
description: Plan and control Victron ESS with forecasts & dynamic tariffs!
url: https://github.com/vervoto1/optivolt
image: "ghcr.io/vervoto1/{arch}-addon-optivolt"
arch:
  - aarch64
  - amd64
startup: application
init: false
hostname: optivolt

# Ingress lets the UI appear inside Home Assistant without opening a port.
ingress: true
ingress_port: 3000
panel_title: Optivolt
panel_icon: mdi:home-battery-outline
homeassistant_api: true

ports:
  "3000/tcp": 3070
ports_description:
  "3000/tcp": Direct API access (use ingress for UI)

# Persist add-on state in /data
map:
  - data:rw

options:
  site_id: ""
  vrm_token: ""
  mqtt_host: "venus.local"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_tls: false
  mqtt_tls_insecure: false

schema:
  site_id: str
  vrm_token: password
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: password
  mqtt_tls: bool
  mqtt_tls_insecure: bool
